<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>종목 상세 분석</title>
    <style>
        :root {
            --binance-yellow: #FCD535;
            --bg-color: #FAFAFA;
            --text-dark: #1E2329;
            --text-gray: #707A8A;
            --card-bg: #FFFFFF;
            --border-color: #EAECEF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; color: var(--text-dark);
        }
        header {
            background-color: var(--card-bg);
            padding: 15px 20px; display: flex; align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            background: none; border: none; font-size: 20px;
            margin-right: 15px; cursor: pointer; color: var(--text-dark); padding: 0;
        }
        h1 { font-size: 18px; margin: 0; display: flex; align-items: center; gap: 8px;}
        .ticker-badge {
            font-size: 12px; background-color: #F0F2F5;
            padding: 3px 8px; border-radius: 4px; color: #707A8A;
        }
        main { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .info-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }
        .icon { font-size: 45px; margin-bottom: 15px; }
        .notice-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        .notice-desc { font-size: 14px; color: var(--text-gray); line-height: 1.6; margin-bottom: 30px; word-break: keep-all;}
        
        .action-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 16px; border-radius: 10px;
            font-size: 15px; font-weight: bold; text-decoration: none;
            margin-bottom: 12px; transition: transform 0.2s, opacity 0.2s; box-sizing: border-box;
        }
        .btn-naver { background-color: #03C75A; color: white; box-shadow: 0 4px 10px rgba(3, 199, 90, 0.2); }
        .btn-tv { background-color: #131722; color: white; box-shadow: 0 4px 10px rgba(19, 23, 34, 0.2); }
        
        .action-btn:hover { transform: translateY(-2px); opacity: 0.95; }
    </style>
</head>
<body>
    <header>
        <button class="back-btn" onclick="history.back()">←</button>
        <h1 id="stock-name">로딩중...</h1>
        <span id="stock-ticker" class="ticker-badge"></span>
    </header>

    <main>
        <div class="info-card">
            <div class="icon">📊</div>
            <div class="notice-title">전문 차트로 이동합니다</div>
            <div class="notice-desc">
                한국거래소(KRX)의 데이터 저작권 보호 정책으로 인해, 외부 웹사이트에 실시간/분봉 차트를 직접 표시하는 것이 제한되어 있습니다.<br><br>
                아래 버튼을 클릭하시면 RSI와 볼린저밴드 확인이 가능한 <b>가장 정확한 전문 차트</b>로 즉시 연결됩니다!
            </div>

            <a href="#" id="link-naver" class="action-btn btn-naver" target="_blank">
                🟢 네이버 증권에서 상세 차트 보기
            </a>
            
            <a href="#" id="link-tv" class="action-btn btn-tv" target="_blank">
                ⚫ 트레이딩뷰에서 전문 차트 보기
            </a>
        </div>
    </main>

    <script>
        // 앞 페이지에서 넘어온 종목 이름과 코드 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || '종목상세';
        const ticker = urlParams.get('ticker');

        document.getElementById('stock-name').textContent = name;
        document.getElementById('stock-ticker').textContent = ticker;

        if(ticker) {
            // 네이버 증권(모바일 최적화 화면) 해당 종목 차트로 즉시 연결
            document.getElementById('link-naver').href = `https://m.stock.naver.com/domestic/stock/${ticker}/total`;
            // 트레이딩뷰 해당 종목 차트로 즉시 연결
            document.getElementById('link-tv').href = `https://kr.tradingview.com/chart/?symbol=KRX:${ticker}`;
        }
    </script>
</body>
</html>
