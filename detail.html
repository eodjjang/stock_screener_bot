<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>종목 상세 차트</title>
    <style>
        :root {
            --binance-yellow: #FCD535;
            --bg-color: #FAFAFA;
            --text-dark: #1E2329;
            --card-bg: #FFFFFF;
            --border-color: #EAECEF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; color: var(--text-dark);
        }
        header {
            background-color: var(--card-bg);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            background: none; border: none; font-size: 20px;
            margin-right: 15px; cursor: pointer; color: var(--text-dark);
        }
        h1 { font-size: 18px; margin: 0; display: flex; align-items: center; gap: 8px;}
        .ticker-badge {
            font-size: 12px; background-color: #F0F2F5;
            padding: 3px 8px; border-radius: 4px; color: #707A8A;
        }
        main { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .chart-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            height: 400px; /* 차트 높이 */
        }
        .chart-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: var(--text-dark); }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="history.back()">←</button>
        <h1 id="stock-name">로딩중...</h1>
        <span id="stock-ticker" class="ticker-badge"></span>
    </header>

    <main>
        <div class="chart-container">
            <div class="chart-title">📊 일봉 차트 (최근 30일 흐름)</div>
            <div id="tv_daily" style="height: 100%; width: 100%;"></div>
        </div>

        <div class="chart-container">
            <div class="chart-title">⚡ 1분봉 차트 (단기 흐름)</div>
            <div id="tv_1min" style="height: 100%; width: 100%;"></div>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. 앞 페이지(index.html)에서 넘어온 종목 정보(이름, 코드) 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || '종목상세';
        const ticker = urlParams.get('ticker');

        document.getElementById('stock-name').textContent = name;
        document.getElementById('stock-ticker').textContent = ticker;

        // 2. 한국 주식 코드를 트레이딩뷰 형식(KRX:005930)으로 변환
        const tvSymbol = "KRX:" + ticker;

        // 3. 차트에 적용할 보조지표 설정 (거래량, 볼린저밴드, RSI)
        const studies = [
            "Volume@tv-basicstudies",      // 거래량
            "BB@tv-basicstudies",          // 볼린저밴드
            "RSI@tv-basicstudies"          // RSI
        ];

        // 일봉(D) 차트 그리기
        if (ticker) {
            new TradingView.widget({
                "autosize": true,
                "symbol": tvSymbol,
                "interval": "D",           // D: 일봉
                "timezone": "Asia/Seoul",
                "theme": "light",
                "style": "1",              // 1: 캔들 차트
                "locale": "kr",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "container_id": "tv_daily",
                "studies": studies
            });

            // 1분봉(1) 차트 그리기
            new TradingView.widget({
                "autosize": true,
                "symbol": tvSymbol,
                "interval": "1",           // 1: 1분봉
                "timezone": "Asia/Seoul",
                "theme": "light",
                "style": "1",
                "locale": "kr",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "container_id": "tv_1min",
                "studies": studies
            });
        }
    </script>
</body>
</html>
