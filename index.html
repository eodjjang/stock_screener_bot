<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 찐바닥 우량주</title>
    <style>
        body { font-family: '맑은 고딕', sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        h1 { text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        table { width: 100%; max-width: 800px; margin: 0 auto; background: white; border-collapse: collapse; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #2c3e50; color: white; font-weight: bold; }
        tr:hover { background-color: #f1f5f9; }
        .rsi-low { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🚀 오늘의 찐바닥 우량주 포착</h1>
    <p class="subtitle">매일 오후 4시(한국시간) 자동 스크리닝</p>

    <table>
        <thead>
            <tr>
                <th>종목코드</th>
                <th>종목명</th>
                <th>현재가</th>
                <th>RSI</th>
                <th>조건단계</th>
            </tr>
        </thead>
        <tbody id="stock-list">
            </tbody>
    </table>

    <script>
        // 로봇이 저장한 result.json 데이터를 불러오는 마법의 코드
        fetch('./screener_web/assets/result.json')
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('stock-list');
                
                // 포착된 종목이 없을 경우
                if(data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5">오늘 포착된 찐바닥 종목이 없습니다 😢</td></tr>';
                    return;
                }

                // 데이터가 있으면 표에 한 줄씩 추가
                data.forEach(stock => {
                    const price = stock.price.toLocaleString(); // 숫자에 쉼표 찍기
                    const rsiClass = stock.rsi <= 30 ? 'rsi-low' : ''; // RSI가 30 이하면 빨간색
                    
                    const row = `<tr>
                        <td>${stock.ticker}</td>
                        <td><strong>${stock.name}</strong></td>
                        <td>${price}원</td>
                        <td class="${rsiClass}">${stock.rsi}</td>
                        <td>${stock.step}단계</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            })
            .catch(error => {
                document.getElementById('stock-list').innerHTML = '<tr><td colspan="5">데이터를 아직 불러오지 못했습니다. 로봇이 스크리닝 중이거나 에러가 발생했습니다.</td></tr>';
            });
    </script>

</body>
</html>
