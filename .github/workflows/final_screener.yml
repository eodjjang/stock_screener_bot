name: Final Stock Screener

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: # ← 이 줄이 버튼을 만듭니다.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Libraries
        run: |
          pip install --upgrade pip
          # pandas 버전을 2.2.2 이하로 제한하여 충돌을 방지합니다.
          pip install "pandas<3.0.0" finance-datareader pandas-ta yfinance
      - name: Run Screener
        run: python screener.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_web/assets/result.json
          git commit -m "Auto-update: $(date)" || echo "No changes"
          git push