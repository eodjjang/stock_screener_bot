name: Final Stock Screener

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: 파이썬 설정 (3.12로 업그레이드)
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # 최신 라이브러리 지원을 위해 3.12 사용
      - name: Install Libraries
        run: |
          pip install --upgrade pip
          pip install setuptools wheel
          # pandas와 기본 라이브러리들
          pip install "pandas<3.0.0" yfinance finance-datareader
          # 주소를 master에서 main으로 수정했습니다!
          pip install https://github.com/twopirllc/pandas-ta/archive/refs/heads/main.zip
      - name: Run Screener
        run: python screener.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_web/assets/result.json
          git commit -m "Auto-update: $(date)" || echo "No changes"
          git push