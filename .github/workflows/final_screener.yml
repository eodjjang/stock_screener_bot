name: Final Stock Screener

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 파이썬 설정 (3.12로 업그레이드)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Libraries
        run: |
          pip install --upgrade pip
          pip install setuptools wheel
          # pandas와 기본 라이브러리들
          pip install "pandas<3.0.0" yfinance finance-datareader
          # 원본 저장소가 삭제되어 커뮤니티 유지보수 버전인 pandas-ta-classic으로 대체 설치합니다!
          pip install pandas-ta-classic
      - name: Run Screener
        run: python screener.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_web/assets/result.json
          git commit -m "Auto-update: $(date)" || echo "No changes"
          git push