name: Daily Stock Screen V2
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Libraries
        run: |
          pip install --upgrade pip
          pip install pandas finance-datareader pandas-ta yfinance
      - name: Run Screener
        run: python screener.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_web/assets/result.json
          git commit -m "Auto-update: \03/23/2026 20:27:01" || echo "No changes"
          git push
