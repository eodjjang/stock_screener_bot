name: Daily Stock Screen
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install pandas FinanceDataReader pandas_ta
      - run: python screener.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_web/assets/result.json
          git commit -m "Auto-update: \03/23/2026 20:09:04" || echo "No changes"
          git push
