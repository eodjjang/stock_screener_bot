name: Daily Stock Screen

on:
  schedule:
    - cron: '0 7 * * *' # 매일 오후 4시 실행 (한국 시간)
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v3
      
      - name: 파이썬 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 3.10에서 3.11로 업그레이드!
          
      - name: 필수 라이브러리 설치
        run: |
          pip install --upgrade pip
          # 이름표를 정확하게 수정했습니다 (소문자와 하이픈)
          pip install pandas finance-datareader pandas-ta yfinance
          
      - name: 스크리닝 실행
        run: python screener.py
        
      - name: 변경사항 저장 및 전송
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_web/assets/result.json
          git commit -m "Auto-update: $(date)" || echo "No changes to commit"
          git push