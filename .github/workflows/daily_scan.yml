name: Daily Stock Screen V2

on:
  schedule:
    - cron: '0 7 * * *' # 매일 오후 4시 (한국 시간)
  workflow_dispatch: # ⭐ 이 줄이 버튼을 만드는 핵심입니다! (뒤에 아무것도 안 붙임)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Libraries
        run: |
          pip install --upgrade pip
          pip install pandas finance-datareader pandas-ta yfinance
      - name: Run Screener
        run: python screener.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_web/assets/result.json
          git commit -m "Auto-update: $(date)" || echo "No changes"
          git push